services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: indoor_pathfinding
    ports:
      - "5432:5432"
    volumes:
      - ~/docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ~/docker-data/api:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/indoor_pathfinding
      SLAM_API_URL: http://slam:8001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: docker/ros2/ros2.Dockerfile
    ports:
      - "50051:50051"
    volumes:
      - ~/docker-data/slam/rosbag2:/workspace/rosbag2
    environment:
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    restart: unless-stopped

  slam:
    build:
      context: ..
      dockerfile: docker/slam/${SLAM_ENGINE}.Dockerfile
    ports:
      - "8001:8000"
      - "7860:7860"
      - "8080:8080"
    volumes:
      - ~/docker-data/slam/${SLAM_ENGINE}/maps:/workspace/maps
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
