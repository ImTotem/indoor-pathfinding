services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: indoor_pathfinding
    ports:
      - "5432:5432"
    volumes:
      - ~/docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ~/docker-data/api:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/indoor_pathfinding
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  slam:
    build:
      context: ..
      dockerfile: docker/slam/${SLAM_ENGINE}.Dockerfile
    ports:
      - "50051:50051"
      - "8012:8012"
    volumes:
      - ~/docker-data/slam/${SLAM_ENGINE}/maps:/workspace/maps
      - ~/docker-data/slam/${SLAM_ENGINE}/rosbag2:/workspace/rosbag2
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
