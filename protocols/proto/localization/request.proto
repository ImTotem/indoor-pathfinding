syntax = "proto3";

package indoor_pathfinding.localization;

import "common.proto";

message LocalizationPacket {
  string session_id = 1;
  double timestamp = 2;
  bytes query_image = 3;
  indoor_pathfinding.common.Intrinsics intrinsics = 4;
  indoor_pathfinding.common.BarometerData barometer = 5;
  optional LocalizationHint hint = 6;
  int32 device_orientation = 7; // 디바이스 회전 각도 (0, 90, 180, 270)
}

message LocalizationHint {
  oneof hint {
    indoor_pathfinding.common.Vector3 last_position = 1;
    string keyframe_id = 2;
  }
}
