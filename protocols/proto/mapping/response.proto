syntax = "proto3";

package indoor_pathfinding.mapping;

import "common.proto";

message MappingResponse {
  double timestamp = 1;
  indoor_pathfinding.common.Pose pose = 2;
  MappingState state = 3;
}

enum MappingState {
  MAPPING_STATE_UNSPECIFIED = 0;
  MAPPING_STATE_OK = 1;
  MAPPING_STATE_LOST = 2;
  MAPPING_STATE_INITIALIZING = 3;
}
