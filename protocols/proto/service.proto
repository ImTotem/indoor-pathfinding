syntax = "proto3";

package indoor_pathfinding.service;

import "mapping/request.proto";
import "mapping/response.proto";
import "localization/request.proto";
import "localization/response.proto";
import "session/request.proto";
import "session/response.proto";

service MappingService {
  rpc StreamMapping(stream indoor_pathfinding.mapping.MappingPacket)
      returns (stream indoor_pathfinding.mapping.MappingResponse);
}

service LocalizationService {
  rpc Localize(stream indoor_pathfinding.localization.LocalizationPacket)
      returns (stream indoor_pathfinding.localization.LocalizationResponse);
}

service SessionService {
  rpc Start(indoor_pathfinding.session.StartSessionPacket)
      returns (indoor_pathfinding.session.SessionResponse);

  rpc Stop(indoor_pathfinding.session.StopSessionPacket)
      returns (indoor_pathfinding.session.SessionResponse);

  rpc GetStatus(indoor_pathfinding.session.GetStatusRequest)
      returns (indoor_pathfinding.session.SessionResponse);

  rpc SyncTime(indoor_pathfinding.session.SyncTimeRequest)
      returns (indoor_pathfinding.session.SyncTimeResponse);

  rpc SetTimeOffset(indoor_pathfinding.session.SetTimeOffsetRequest)
      returns (indoor_pathfinding.session.SessionResponse);

  rpc CleanupStale(indoor_pathfinding.session.CleanupStaleRequest)
      returns (indoor_pathfinding.session.SessionResponse);
}
