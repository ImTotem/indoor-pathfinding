syntax = "proto3";

package indoor_pathfinding.sensor;

// === 공통 ===

message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Quaternion {
  double x = 1;
  double y = 2;
  double z = 3;
  double w = 4;
}

message Intrinsics {
  double fx = 1;
  double fy = 2;
  double cx = 3;
  double cy = 4;
}

// === 맵 생성 (MASt3R-SLAM) ===

message MappingPacket {
  string session_id = 1;
  double timestamp = 2;
  bytes image_data = 3;
  repeated ImuSample imu_samples = 4;
  Intrinsics intrinsics = 5;
}

message ImuSample {
  double timestamp = 1;
  Vector3 acceleration = 2;
  Vector3 angular_velocity = 3;
}

message MappingResult {
  double timestamp = 1;
  Vector3 position = 2;
  Quaternion orientation = 3;
  MappingState state = 4;
}

enum MappingState {
  MAPPING_STATE_UNSPECIFIED = 0;
  MAPPING_STATE_OK = 1;
  MAPPING_STATE_LOST = 2;
  MAPPING_STATE_INITIALIZING = 3;
}

// === 위치 탐색 (RoMa) ===

message LocalizationPacket {
  string session_id = 1;
  double timestamp = 2;
  bytes query_image = 3;
  Intrinsics intrinsics = 4;
  optional LocalizationHint hint = 5;
}

message LocalizationHint {
  oneof hint {
    Vector3 last_position = 1;
    string keyframe_id = 2;
  }
}

message LocalizationResult {
  double timestamp = 1;
  Vector3 position = 2;
  Quaternion orientation = 3;
  float confidence = 4;
  LocalizationState state = 5;
}

enum LocalizationState {
  LOCALIZATION_STATE_UNSPECIFIED = 0;
  LOCALIZATION_STATE_OK = 1;
  LOCALIZATION_STATE_LOST = 2;
}

// === gRPC 서비스 ===

service MappingService {
  rpc StreamMapping(stream MappingPacket) returns (stream MappingResult);
}

service LocalizationService {
  rpc Localize(stream LocalizationPacket) returns (stream LocalizationResult);
}
