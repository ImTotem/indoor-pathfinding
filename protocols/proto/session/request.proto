syntax = "proto3";

package indoor_pathfinding.session;

message StartSessionPacket {
  string session_id = 1;
  string map_id = 2;
  SessionType type = 3;
}

enum SessionType {
  SESSION_TYPE_MAPPING = 0;
  SESSION_TYPE_LOCALIZATION = 1;
}

message StopSessionPacket {
  string session_id = 1;
}

message GetStatusRequest {}
