syntax = "proto3";

package indoor_pathfinding.sync;

// 세션 제어 요청
message SessionRequest {
  oneof command {
    StartSession start = 1;
    StopSession stop = 2;
    GetStatusRequest status = 3;
  }
}

message StartSession {
  string session_id = 1;
  SessionConfig config = 2;
}

message SessionConfig {
  // 카메라 프레임 전송 주기 (Hz)
  double camera_fps = 1;
  // IMU 전송 주기 (Hz)
  double imu_rate = 2;
  // rosbag 녹화 활성화 여부
  bool enable_recording = 3;
}

message StopSession {
  string session_id = 1;
}

message GetStatusRequest {}

// 세션 제어 응답
message SessionResponse {
  string session_id = 1;
  SessionState state = 2;
  string message = 3;
}

enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_IDLE = 1;
  SESSION_STATE_ACTIVE = 2;
  SESSION_STATE_STOPPING = 3;
  SESSION_STATE_ERROR = 4;
}

// gRPC 서비스
service SyncService {
  // 세션 시작
  rpc Start(StartSession) returns (SessionResponse);
  // 세션 중지
  rpc Stop(StopSession) returns (SessionResponse);
  // 현재 상태 조회
  rpc GetStatus(GetStatusRequest) returns (SessionResponse);
}
